<div class="bar-chart-wrapper">
  <canvas class="bar-chart" id="BusinessVsResearchByLang"></canvas>
  <canvas class="bar-chart" id="BusinessVsResearchByField"></canvas>

  <section class="pie-chart-wrapper">
    <canvas class="pie-chart" id="AverageCloneCoverageSci"></canvas>
    <canvas class="pie-chart" id="AverageCloneCoverageNonSci"></canvas>
  </section>

  <button (click)="maxLOC.set(maxLOC() - 25000)" >Decrease LOC</button>
  <button (click)="maxLOC.set(maxLOC() + 25000)">Increase LOC</button>
  <canvas class="bar-chart" id="CloneCoverageLOCScatter"></canvas>

  <button (click)="maxAuthors.set(maxAuthors() - 10)" >Decrease Authors</button>
  <button (click)="maxAuthors.set(maxAuthors() + 10)">Increase Authors</button>
  <canvas class="bar-chart" id="CloneCoverageAuthorScatter"></canvas>

  <button (click)="maxForks.set(maxForks() - 10)" >Decrease Forks</button>
  <button (click)="maxForks.set(maxForks() + 10)">Increase Forks</button>
  <canvas class="bar-chart" id="CloneCoverageForksScatter"></canvas>

  <canvas class="bar-chart" id="CloneCoverageBoxPlot"></canvas>
</div>
