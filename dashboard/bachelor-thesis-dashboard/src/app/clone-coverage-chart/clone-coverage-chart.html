<section class="chart-wrapper">
  <canvas class="chart" id="BusinessVsResearchByLang"></canvas>
  <section class="increase-button-wrapper">
    <span>Min Count of Lang </span>
    <input [(ngModel)]="CloneByLangMin" type="number"/>
  </section>

  <app-field-bar-plot
    key="clone_coverage"
  />

  <canvas class="chart" id="AverageCloneCoverage"></canvas>

  <canvas class="chart" id="CloneCoverageLine"></canvas>

  <canvas class="chart" id="CloneCoverageLOCLine"></canvas>

  <canvas class="chart" id="CloneCoverageAuthorLine"></canvas>


  <app-scatter-plot
    key1="LOC"
    key2="clone_coverage"
    [max_key1]="100000"
    [changeValue_key1]="25000"
    [max_key2]="1"
    selectOption="lang"
  />

  <app-scatter-plot
    key1="authors"
    key2="clone_coverage"
    [max_key1]="80"
    [changeValue_key1]="10"
    [max_key2]="1"
    selectOption="lang"
  />

  <app-scatter-plot
    key1="forks"
    key2="clone_coverage"
    [max_key1]="80"
    [changeValue_key1]="10"
    [max_key2]="1"
  />

  <app-scatter-plot
    key1="files"
    key2="clone_coverage"
    [max_key1]="10000"
    [changeValue_key1]="500"
    [max_key2]="1"
  />

  <app-scatter-plot
    key1="findings_count"
    key2="clone_coverage"
    [max_key1]="5000"
    [changeValue_key1]="250"
    [max_key2]="1"
  />

  <canvas class="chart" id="CloneCoverageBoxPlot"></canvas>
</section>
