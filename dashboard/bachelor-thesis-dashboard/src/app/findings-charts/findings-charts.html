<section class="chart-wrapper">
  <canvas class="chart tag-cloud" id="TagCloudFindings"></canvas>
  <label>
    Should count or count red be displayed? (current: {{wordCloudCount() ? 'count' : 'count red'}})
    <input
      type="checkbox"
      [(ngModel)]="wordCloudCount"
    />
  </label>

  <canvas class="chart" id="FindingsBarSciNonSci"></canvas>
  <label>
    Should count/count red be displayed by average or median? (current: {{barMedian() ? 'median' : 'average'}})
    <input
      type="checkbox"
      [(ngModel)]="barMedian"
    />
  </label>

  <canvas class="chart" id="FindingsPerLOC"></canvas>
  <label>
    Should count/count red be displayed by 1000 LOC or Average? (current: {{LOCBarPer1000() ? 'By 1000 LOC' : 'Average'}})
    <input
      type="checkbox"
      [(ngModel)]="LOCBarPer1000"
    />
  </label>
  <span> Filter here for a Finding Category </span>
  <select [(ngModel)]="selectedLOCBarCategory">
    <option [ngValue]="undefined"> All Findings</option>
    @for(item of categorySelectOptions; track item){
      <option [ngValue]="item">
        {{ item }}
      </option>
    }
  </select>

  <canvas class="chart" id="FindingsInLine"></canvas>

  <app-field-bar-plot
    key="findings_count"
  />

  <canvas class="chart" id="FindingsLangBar"></canvas>

  <canvas class="chart" id="FindingsLineLOC"></canvas>
  <canvas class="chart" id="FindingsLinefiles"></canvas>
  <canvas class="chart" id="FindingsLineauthors"></canvas>

  <app-scatter-plot
    key1="LOC"
    [max_key1]="1000000"

    key2="findings_count"
    [max_key2]="5000000"
  />

</section>
