<section class="chart-wrapper">

  <canvas class="chart" id="ScoringLine"></canvas>
  <canvas class="chart" id="AverageScoring"></canvas>
  <canvas class="chart" id="ScoringBoxplot"></canvas>

  <app-field-bar-plot
    key="scoring"
  />



  <app-scatter-plot
    key1="LOC"
    [max_key1]="100000"
    [changeValue_key1]="25000"

    key2="files"
    [max_key2]="30000"
    [changeValue_key2]="2500"

    borderRadius="clone_coverage"
  />

  <app-scatter-plot
    key1="method_length"
    sub_key1="red"
    [max_key1]="8000"
    [changeValue_key1]="500"

    key2="files"
    [max_key2]="30000"
    [changeValue_key2]="2500"

    borderRadius="clone_coverage"
  />

  <canvas class="chart" id="LanguagePie"></canvas>


</section>
