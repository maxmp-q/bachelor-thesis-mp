name: Deploy Angular to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: dashboard/bachelor-thesis-dashboard
        run: npm install

      - name: Build Angular app
        working-directory: dashboard/bachelor-thesis-dashboard
        run: npm run build -- --configuration production --base-href "https://maxmp-q.github.io/bachelor-thesis-mp/"

      - name: Install GitHub Pages
        run: npm install -g angular-cli-ghpages

      - name: Deploy to GitHub Pages
        working-directory: dashboard/bachelor-thesis-dashboard
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx angular-cli-ghpages --dir=dist/bachelor-thesis-dashboard